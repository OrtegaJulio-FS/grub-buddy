services:
  - type: web
    name: grubbuds-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: grubbuds-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Set these in the Render dashboard after the service is created -
      # Cloudinary credentials shouldn't live in a committed file.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Your deployed frontend's URL (e.g. https://grubbuds.vercel.app) -
      # comma-separate more than one. With NODE_ENV=production above, leaving
      # this unset blocks all cross-origin requests rather than allowing any
      # origin, so this needs to be set before the frontend can reach the API.
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: grubbuds-db
    plan: free
    databaseName: grubbuds
    user: grubbuds
